spring:
  application:
    name: url-shortener
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/urlshortener_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

server:
  port: 8080

