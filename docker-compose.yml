services:
  postgres:
    image: 'postgres:17-alpine'
    container_name: 'postgres-db'
    environment:
      - 'POSTGRES_USER=postgres'
      - 'POSTGRES_PASSWORD=postgres'
      - 'POSTGRES_DB=urlshortener_db'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # garantir que postgres foi inicializado antes de iniciar o app
      test: [ "CMD-SHELL", "pg_isready -U postgres -d urlshortener_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
  app:
    build: .
    container_name: 'url-shortener-api'
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - 'DB_URL=jdbc:postgresql://postgres:5432/urlshortener_db'
      - 'DB_USERNAME=postgres'
      - 'DB_PASSWORD=postgres'
  redis:
    image: 'redis:8-alpine'
    container_name: 'redis-cache'
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: